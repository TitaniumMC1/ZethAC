name: ZethAC
version: '1.1.0-FIXED'
main: dev.zeth.zethac.ZethAC
api-version: '1.21'
description: Advanced Minecraft Anti-Cheat — Fixed Edition
author: Zeth

commands:
  zethac:
    description: ZethAC main command
    aliases: [zac, anticheat]
    usage: /zethac <help|reload|alerts|verbose|ban|kick|info|logs>
    permission: zethac.admin

permissions:
  zethac.admin:
    description: Full ZethAC access
    default: op
  zethac.alerts:
    description: Receive cheat alerts
    default: op
  zethac.verbose:
    description: Receive verbose debug info
    default: op
  zethac.bypass:
    description: Bypass all checks
    default: false
  zethac.notify:
    description: Receive notifications
    default: op
